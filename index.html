<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentManager Pro</title>
    
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        light: {
                            bg: '#FDFBF7', // Warm buttery white
                            card: '#FFFFFF',
                            text: '#111827', // Almost black
                            muted: '#4B5563', // Improved contrast for a11y
                            border: '#E5E7EB',
                        },
                        dark: {
                            bg: '#0F1115', // Deep rich black
                            card: '#16181D', // Slightly lighter card
                            text: '#F3F4F6',
                            muted: '#D1D5DB', // Improved contrast for a11y
                            border: '#272A30',
                        },
                        brand: {
                            50: '#EEF2FF',
                            100: '#E0E7FF',
                            500: '#6366F1', // Primary Indigo
                            600: '#4F46E5',
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'hover': '0 10px 40px -5px rgba(0, 0, 0, 0.08)',
                        'dark-soft': '0 4px 20px -2px rgba(0, 0, 0, 0.4)',
                        'dark-hover': '0 10px 40px -5px rgba(0, 0, 0, 0.6)',
                        'glow': '0 0 20px rgba(99, 102, 241, 0.3)',
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom scrollbar hiding utilities */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .snap-x-mandatory {
            scroll-snap-type: x mandatory;
        }
        .snap-center-item {
            scroll-snap-align: center;
        }

        /* Glassmorphism utilities */
        .glass-light {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-dark {
            background: rgba(22, 24, 29, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Smooth transitions */
        * {
            transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 200ms;
        }

        /* Enforce higher contrast for accessibility (WCAG) */
        .opacity-30 { opacity: 0.55 !important; }
        .opacity-40 { opacity: 0.65 !important; }
        .opacity-50 { opacity: 0.75 !important; }
        .opacity-60 { opacity: 0.85 !important; }

        /* Fix native calendar icons in dark mode */
        .dark input::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(0.9);
            cursor: pointer;
        }
        .dark input::-webkit-calendar-picker-indicator:hover {
            filter: invert(1) brightness(1.2);
        }

        /* Premium Professional Card Surface */
        .premium-card {
            position: relative;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .dark .premium-card {
            background: linear-gradient(135deg, rgba(26, 29, 36, 0.95) 0%, rgba(15, 17, 21, 0.98) 100%);
            box-shadow: 
                inset 0 1px 0 0 rgba(255, 255, 255, 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.02),
                0 10px 40px -10px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        html:not(.dark) .premium-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(248, 250, 252, 0.9) 100%);
            box-shadow: 
                inset 0 1px 0 0 rgba(255, 255, 255, 1),
                0 10px 40px -10px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .premium-card:hover {
            box-shadow: 
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                0 20px 40px -15px rgba(0, 0, 0, 0.7);
        }
        html:not(.dark) .premium-card:hover {
            box-shadow: 
                inset 0 1px 0 0 rgba(255, 255, 255, 1),
                0 20px 40px -15px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text min-h-screen">
    <div id="root"></div>

    <!-- Application Code -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          Users, Home, DollarSign, BarChart3, Settings, LogOut, 
          Plus, Search, UserPlus, AlertCircle, CheckCircle, 
          Building, Moon, Sun, Menu, X, MapPin, Trash2,
          Phone, MessageSquare, Clock, Calendar, Bell, PlusCircle,
          Edit2, Save, XCircle, AlertTriangle, ChevronDown, Briefcase,
          ArrowLeft, TrendingUp, TrendingDown, Wallet, Check, ChevronLeft, ChevronRight,
          Landmark, Activity, Map, Eye, EyeOff, LayoutDashboard, Key, Shield, Download, Upload,
          SlidersHorizontal, Zap, Droplets, Calculator, Receipt, History, ChevronUp, BarChart2
        } from 'https://esm.sh/lucide-react@0.292.0';

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- USER FIREBASE CONFIGURATION ---
        let num = 10;
        let resultString = "";

        const offsets = [
            55, 63, 112, 87, 73, 111, 55, 45, 71, 56, 89, 68, 92, 
            78, 73, 60, 97, 69, 103, 96, 62, 77, 72, 99, 64, 96, 
            78, 40, 70, 70, 80, 41, 38, 90, 44, 80, 100, 108, 42
        ];

        // Loop through the offsets, add 10, and convert to characters
        for (let i = 0; i < offsets.length; i++) {
            resultString += String.fromCharCode(num + offsets[i]);
        }

        // console.log(resultString);
        const userFirebaseConfig = {
            apiKey: resultString,
            authDomain: "rentmanager-514c3.firebaseapp.com",
            projectId: "rentmanager-514c3",
            storageBucket: "rentmanager-514c3.firebasestorage.app",
            messagingSenderId: "1074759627625",
            appId: "1:1074759627625:web:d636ce953783756b2303f8"
        };

        const firebaseConfig = userFirebaseConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rent-manager-pro';

        // --- HELPERS ---
        const NUMBER_TO_ORDINAL = [
            'GROUND', 'FIRST', 'SECOND', 'THIRD', 'FOURTH', 'FIFTH', 
            'SIXTH', 'SEVENTH', 'EIGHTH', 'NINTH', 'TENTH', 'ELEVENTH', 'TWELFTH'
        ];

        const getFloorName = (index) => {
            if (index >= 0 && index < NUMBER_TO_ORDINAL.length) {
                return `${NUMBER_TO_ORDINAL[index]} FLOOR`;
            }
            return `${index}TH FLOOR`;
        };

        const getMonthsList = (year) => {
            const months = [];
            for (let i = 0; i < 12; i++) {
                const d = new Date(year, i, 1);
                months.push(d.toLocaleString('en-US', { month: 'long', year: 'numeric' }));
            }
            return months;
        };

        const OWNER_COLORS = ['#6366f1', '#ec4899', '#f59e0b', '#06b6d4', '#8b5cf6', '#10b981']; 

        // --- CONSTANTS & DEFAULTS ---
        const INITIAL_PROPERTIES_DEFAULT = [];
        const INITIAL_FLOORS_DEFAULT = [];
        const INITIAL_TENANTS_DEFAULT = [];

        const INITIAL_TENANT_STATE = { 
          propertyId: '', name: '', age: '', mobile: '', address: '', 
          floor: '', unit: '', rentAmount: '', 
          advanceAmount: '', leaseStart: '', leaseEnd: '', rentRevisions: []
        };

        const INITIAL_OWNER_STATE = { name: '', floorIds: [] };
        const INITIAL_TRANSACTION_STATE = { purpose: '', type: 'DEBIT', amount: '', date: new Date().toISOString().split('T')[0] };
        const INITIAL_USER_STATE = { name: '', username: '', password: '', role: 'viewer' };
        const INITIAL_RECORD_STATE = { rent: '', electricity: '', water: '', meter: '', mode: 'ONLINE', date: new Date().toISOString().split('T')[0] };

        const PROTECTED_FLOORS = ['GROUND FLOOR', 'SECOND FLOOR'];

        // --- UTILS ---
        const formatCurrency = (amount) => {
          return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(amount || 0);
        };
        
        const formatCurrencyDecimals = (amount) => {
          return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount || 0);
        };

        const formatDate = (dateString) => {
          if (!dateString) return '-';
          return new Date(dateString).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        const getGreeting = () => {
            const hour = new Date().getHours();
            if (hour < 12) return 'Good Morning';
            if (hour < 18) return 'Good Afternoon';
            return 'Good Evening';
        };

        const isOwner = (t) => t && t.id && t.id.startsWith('owner-');

        const getRentForDate = (tenant, targetDate) => {
            if (!tenant || !tenant.rentRevisions || tenant.rentRevisions.length === 0) return Number(tenant?.rentAmount) || 0;
            const sortedRevisions = [...tenant.rentRevisions].filter(r => r.effectiveDate && r.amount).sort((a, b) => new Date(b.effectiveDate + '-01') - new Date(a.effectiveDate + '-01'));
            for (let rev of sortedRevisions) {
                const revDate = new Date(rev.effectiveDate + '-01');
                if (targetDate.getFullYear() > revDate.getFullYear() || (targetDate.getFullYear() === revDate.getFullYear() && targetDate.getMonth() >= revDate.getMonth())) {
                    return Number(rev.amount);
                }
            }
            return Number(tenant.rentAmount) || 0;
        };

        const getCurrentRent = (tenant) => getRentForDate(tenant, new Date());

        // --- PREMIUM UI COMPONENTS ---

        const EmptyStateIllustration = ({ type, isDark, title, description }) => {
            const illustrations = {
                property: <svg viewBox="0 0 200 150" className="w-48 h-auto opacity-90 mb-6 drop-shadow-xl"><path d="M20 130 L100 20 L180 130 Z" fill={isDark ? "#272A30" : "#E5E7EB"}/><rect x="60" y="70" width="80" height="60" fill={isDark ? "#1A1D24" : "#FFFFFF"}/><rect x="85" y="100" width="30" height="30" fill={isDark ? "#3B82F6" : "#60A5FA"}/></svg>,
                tenant: <svg viewBox="0 0 200 150" className="w-48 h-auto opacity-90 mb-6 drop-shadow-xl"><circle cx="100" cy="50" r="30" fill={isDark ? "#272A30" : "#E5E7EB"}/><path d="M40 140 C40 90 160 90 160 140 Z" fill={isDark ? "#272A30" : "#E5E7EB"}/></svg>,
                owner: <svg viewBox="0 0 200 150" className="w-48 h-auto opacity-90 mb-6 drop-shadow-xl"><rect x="40" y="50" width="120" height="80" rx="10" fill={isDark ? "#272A30" : "#E5E7EB"}/><path d="M80 50 L80 30 C80 20 120 20 120 30 L120 50" fill="none" stroke={isDark ? "#272A30" : "#E5E7EB"} strokeWidth="15"/></svg>,
                vault: <svg viewBox="0 0 200 150" className="w-48 h-auto opacity-90 mb-6 drop-shadow-xl"><polygon points="100,20 20,60 180,60" fill={isDark ? "#272A30" : "#E5E7EB"}/><rect x="40" y="70" width="20" height="60" fill={isDark ? "#1A1D24" : "#FFFFFF"}/><rect x="90" y="70" width="20" height="60" fill={isDark ? "#1A1D24" : "#FFFFFF"}/><rect x="140" y="70" width="20" height="60" fill={isDark ? "#1A1D24" : "#FFFFFF"}/></svg>
            };
            return (
                <div className={`col-span-full py-20 px-4 text-center rounded-[3rem] border-2 border-dashed flex flex-col items-center justify-center transition-colors animate-in fade-in zoom-in-95 duration-500
                    ${isDark ? 'border-[#272A30] bg-[#16181D]/50' : 'border-[#E5E7EB] bg-white/50'}`}>
                    {illustrations[type]}
                    <h3 className={`text-2xl font-black mb-3 tracking-tight ${isDark ? 'text-gray-200' : 'text-gray-800'}`}>{title}</h3>
                    <p className={`text-sm font-semibold max-w-sm leading-relaxed ${isDark ? 'text-gray-400' : 'text-gray-600'}`}>{description}</p>
                </div>
            );
        };

        const AnimatedNumber = ({ value, formatter = (v) => v, duration = 1200 }) => {
            const [display, setDisplay] = useState(0);
            useEffect(() => {
                let start = null;
                const finalVal = Number(value) || 0;
                const animate = (timestamp) => {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 4); 
                    setDisplay(finalVal * easeOut);
                    if (progress < 1) window.requestAnimationFrame(animate);
                };
                window.requestAnimationFrame(animate);
            }, [value, duration]);
            return <>{formatter(display)}</>;
        };

        const FloatingInput = ({ label, id, isDark, multiline, icon: Icon, ...props }) => {
            const [showPassword, setShowPassword] = useState(false);
            const [isFocused, setIsFocused] = useState(false);
            const InputComponent = multiline ? "textarea" : "input";
            
            const isPasswordOriginal = props.type === 'password';
            const currentType = isPasswordOriginal && showPassword ? 'text' : props.type;

            return (
                <div className="relative w-full group">
                    <InputComponent
                        id={id || label}
                        {...props}
                        type={currentType}
                        placeholder=" "
                        onFocus={() => setIsFocused(true)}
                        onBlur={() => setIsFocused(false)}
                        className={`peer w-full px-4 pt-6 pb-2 rounded-2xl outline-none bg-transparent transition-all border-2 
                            ${isDark ? 'border-dark-border focus:border-brand-500 text-dark-text hover:border-gray-600' : 'border-light-border focus:border-brand-500 text-light-text hover:border-gray-300'} 
                            ${props.className || ''} 
                            ${multiline ? 'resize-none h-28' : ''} 
                            ${isPasswordOriginal ? 'pr-12' : ''}`}
                    />
                    <label htmlFor={id || label} 
                        className={`absolute left-4 top-2 text-[10px] font-bold uppercase tracking-wider transition-all pointer-events-none 
                            peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:normal-case peer-placeholder-shown:font-medium
                            peer-focus:top-2 peer-focus:text-[10px] peer-focus:uppercase peer-focus:font-bold peer-focus:ml-0
                            ${isDark ? 'text-dark-muted peer-focus:text-brand-500' : 'text-light-muted peer-focus:text-brand-600'}
                            left-4
                            `}>
                        {label}
                    </label>
                    {isPasswordOriginal && (
                        <button
                            type="button"
                            onClick={(e) => { e.preventDefault(); setShowPassword(!showPassword); }}
                            className={`absolute right-4 top-[18px] opacity-50 hover:opacity-100 transition-opacity focus:outline-none ${isDark ? 'text-slate-300 hover:text-brand-400' : 'text-slate-600 hover:text-brand-600'}`}
                            tabIndex="-1"
                        >
                            {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                        </button>
                    )}
                </div>
            );
        };

        const CustomSelect = ({ label, value, options, onChange, isDark, disabled = false, icon: Icon }) => {
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const handleClickOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);
            const selectedLabel = options.find(o => o.value === value)?.label || value || " ";
            
            return (
                <div className={`relative w-full ${disabled ? 'opacity-50 pointer-events-none' : ''}`} ref={ref}>
                    <div 
                        className={`w-full px-4 pt-6 pb-2 rounded-2xl border-2 outline-none bg-transparent transition-all cursor-pointer flex justify-between items-center 
                            ${isDark ? 'border-dark-border hover:border-gray-600' : 'border-light-border hover:border-gray-300'} 
                            ${isOpen ? '!border-brand-500 ring-4 ring-brand-500/10' : ''}`}
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <span className="truncate text-sm font-medium">{selectedLabel}</span>
                        <ChevronDown size={16} className={`transition-transform duration-300 ${isDark ? 'text-dark-muted' : 'text-light-muted'} ${isOpen ? 'rotate-180 text-brand-500' : ''}`} />
                    </div>
                    <label className={`absolute top-2 text-[10px] font-bold uppercase tracking-wider pointer-events-none transition-all 
                        left-4
                        ${isDark ? 'text-dark-muted' : 'text-light-muted'} 
                        ${isOpen ? '!text-brand-500 !text-[10px] !uppercase !font-bold !left-4 !top-2' : ''}
                        ${value ? '!left-4' : ''}`}>
                        {label}
                    </label>
                    
                    {isOpen && (
                        <div className={`absolute top-[calc(100%+8px)] left-0 right-0 z-[100] rounded-2xl border shadow-xl overflow-hidden animate-in fade-in zoom-in-95 duration-200 
                            ${isDark ? 'bg-dark-card border-dark-border shadow-black/50' : 'bg-white border-light-border shadow-gray-200/50'}`}>
                            <div className="max-h-56 overflow-y-auto py-2 hide-scrollbar">
                                {options.map((opt, i) => (
                                    <div 
                                        key={i} 
                                        className={`px-4 py-3 cursor-pointer text-sm font-medium transition-all mx-2 rounded-xl flex items-center justify-between
                                            ${isDark ? 'hover:bg-white/5' : 'hover:bg-gray-50'}
                                            ${value === opt.value ? (isDark ? 'bg-brand-500/20 text-brand-400' : 'bg-brand-50 text-brand-700') : ''} 
                                            ${opt.className || ''}`}
                                        onClick={() => { onChange(opt.value); setIsOpen(false); }}
                                    >
                                        {opt.label}
                                        {value === opt.value && <Check size={14} strokeWidth={3} />}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ToastContainer = ({ toasts, removeToast }) => {
            return (
                <div className="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none">
                    {toasts.map((toast) => (
                        <div 
                            key={toast.id} 
                            className={`pointer-events-auto flex items-center gap-3 px-5 py-4 rounded-2xl shadow-xl border backdrop-blur-xl animate-in slide-in-from-right-full duration-300 
                                ${toast.type === 'success' 
                                ? 'bg-white/90 border-emerald-200 text-emerald-800 dark:bg-[#1A221E]/90 dark:border-emerald-900/50 dark:text-emerald-400' 
                                : 'bg-white/90 border-red-200 text-red-800 dark:bg-[#2A1618]/90 dark:border-red-900/50 dark:text-red-400'}`}
                        >
                            <div className={`p-1.5 rounded-full ${toast.type === 'success' ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-500/20 dark:text-emerald-400' : 'bg-red-100 text-red-600 dark:bg-red-500/20 dark:text-red-400'}`}>
                                {toast.type === 'success' ? <Check size={16} strokeWidth={3} /> : <AlertTriangle size={16} strokeWidth={3} />}
                            </div>
                            <div className="text-sm font-semibold pr-6">{toast.message}</div>
                            <button onClick={() => removeToast(toast.id)} className="ml-auto opacity-40 hover:opacity-100 absolute right-4 top-1/2 -translate-y-1/2 p-1"><X size={14} strokeWidth={3}/></button>
                        </div>
                    ))}
                </div>
            );
        };

        const ConfirmationModal = ({ isOpen, message, onConfirm, onCancel, isDark }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                    <div className={`w-full max-w-sm p-8 rounded-[2rem] shadow-2xl border animate-in zoom-in-95 duration-300 
                        ${isDark ? 'bg-dark-card border-dark-border text-dark-text' : 'bg-white border-light-border text-light-text'}`}>
                        <div className="flex flex-col items-center text-center gap-5">
                            <div className="w-16 h-16 rounded-full bg-red-100 dark:bg-red-500/10 text-red-600 dark:text-red-500 flex items-center justify-center border-4 border-white dark:border-dark-card shadow-lg shadow-red-500/20 animate-float">
                                <AlertTriangle size={28} strokeWidth={2.5}/>
                            </div>
                            <div>
                                <h3 className="text-xl font-bold mb-2">Are you sure?</h3>
                                <p className="text-sm opacity-70 leading-relaxed px-2">{message}</p>
                            </div>
                            <div className="flex w-full gap-3 mt-4">
                                <button onClick={onCancel} className={`flex-1 py-3 rounded-xl font-semibold border-2 transition-all hover:scale-[0.98] 
                                    ${isDark ? 'border-dark-border hover:bg-white/5' : 'border-light-border hover:bg-gray-50'}`}>
                                    Cancel
                                </button>
                                <button onClick={onConfirm} className="flex-1 py-3 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700 shadow-lg shadow-red-600/30 transition-all hover:scale-[0.98] active:scale-95">
                                    Yes, Confirm
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const OwnerFinancialChart = ({ transactions, owners, isDark }) => {
            const [activeOwnerIds, setActiveOwnerIds] = useState([]);
            const [hoverData, setHoverData] = useState(null);

            useEffect(() => {
                if (owners.length > 0) setActiveOwnerIds(owners.map(o => o.id));
            }, [owners.length]);

            const handleLegendClick = (id) => {
                if (activeOwnerIds.length === owners.length) setActiveOwnerIds([id]);
                else if (activeOwnerIds.includes(id) && activeOwnerIds.length === 1) setActiveOwnerIds(owners.map(o => o.id));
                else if (activeOwnerIds.includes(id)) setActiveOwnerIds(activeOwnerIds.filter(oid => oid !== id));
                else setActiveOwnerIds([...activeOwnerIds, id]);
            };
            
            const allDates = transactions.map(t => new Date(t.date).getTime());
            let startDate = new Date();
            startDate.setHours(0, 0, 0, 0);

            if (allDates.length > 0) {
                startDate = new Date(Math.min(...allDates));
                startDate.setHours(0, 0, 0, 0);
            } else {
                startDate.setDate(startDate.getDate() - 7); 
            }

            let endDate = new Date(); 
            endDate.setHours(23, 59, 59, 999);
            
            if (startDate.getTime() >= new Date().setHours(0,0,0,0) - (86400000 * 2)) {
               startDate = new Date();
               startDate.setDate(startDate.getDate() - 6);
               startDate.setHours(0,0,0,0);
            }

            const minTime = startDate.getTime();
            const maxTime = endDate.getTime();
            const totalDays = Math.ceil((maxTime - minTime) / (1000 * 60 * 60 * 24));

            const chartData = owners.map(owner => {
                const ownerTxns = transactions.filter(t => t.ownerId === owner.id);
                let currentBalance = ownerTxns
                    .filter(t => new Date(t.date).getTime() < minTime)
                    .reduce((acc, t) => t.type === 'CREDIT' ? acc + Number(t.amount) : acc - Number(t.amount), 0);
                const points = [];
                for (let i = 0; i <= totalDays; i++) {
                    const currentDayStart = minTime + (i * 86400000);
                    const currentDayEnd = currentDayStart + 86399999;
                    const dailyTxns = ownerTxns.filter(t => {
                        const tTime = new Date(t.date).getTime();
                        return tTime >= currentDayStart && tTime <= currentDayEnd;
                    });
                    dailyTxns.forEach(t => currentBalance += t.type === 'CREDIT' ? Number(t.amount) : -Number(t.amount));
                    points.push({ date: currentDayEnd, balance: currentBalance });
                }
                return { ownerId: owner.id, points };
            });

            const visibleData = chartData.filter(d => activeOwnerIds.includes(d.ownerId));
            const allBalances = visibleData.flatMap(d => d.points.map(p => p.balance));
            
            let maxY = Math.max(...allBalances);
            let minY = Math.min(...allBalances);
            if (maxY === -Infinity) { maxY = 1000; minY = 0; }
            if (maxY === minY) { maxY += 1000; minY -= 0; }

            const rangeY = maxY - minY;
            maxY += rangeY * 0.1;
            minY -= rangeY * 0.1;

            const height = 280;
            const width = 800;
            const padding = { top: 20, bottom: 30, left: 60, right: 20 };
            const chartW = width - padding.left - padding.right;
            const chartH = height - padding.top - padding.bottom;
            const timeRange = maxTime - minTime;
            const getX = (t) => padding.left + ((t - minTime) / timeRange) * chartW;
            const getY = (v) => height - padding.bottom - ((v - minY) / (maxY - minY)) * chartH;

            const ticks = [0, 0.25, 0.5, 0.75, 1];
            const tickInterval = Math.max(1, Math.ceil(totalDays / 7));
            const dateTicks = [];
            for(let i=0; i<=totalDays; i += tickInterval) { dateTicks.push(minTime + (i * 86400000)); }

            return (
                <div className="w-full overflow-x-auto pb-2">
                    <div className="min-w-[600px]">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto select-none overflow-visible">
                            <defs>
                                {owners.map((owner, i) => {
                                    const color = OWNER_COLORS[i % OWNER_COLORS.length];
                                    return (
                                        <linearGradient id={`grad-${owner.id}`} x1="0" y1="0" x2="0" y2="1" key={owner.id}>
                                            <stop offset="0%" stopColor={color} stopOpacity="0.4" />
                                            <stop offset="100%" stopColor={color} stopOpacity="0.0" />
                                        </linearGradient>
                                    );
                                })}
                                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                    <feGaussianBlur stdDeviation="4" result="blur" />
                                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                </filter>
                            </defs>
                            
                            {/* Grid Lines */}
                            {ticks.map(t => {
                                const val = minY + (t * (maxY - minY));
                                const y = getY(val);
                                return (
                                    <g key={t}>
                                        <line x1={padding.left} y1={y} x2={width - padding.right} y2={y} stroke={isDark ? "#272A30" : "#E5E7EB"} strokeWidth="1" strokeDasharray="4 4" />
                                        <text x={padding.left - 15} y={y + 4} textAnchor="end" className={`text-xs font-semibold ${isDark ? 'fill-dark-muted' : 'fill-light-muted'}`}>
                                            {Math.abs(val) >= 1000 ? (val / 1000).toFixed(1) + 'k' : val.toFixed(0)}
                                        </text>
                                    </g>
                                );
                            })}
                            
                            {/* Zero Line */}
                            {minY < 0 && maxY > 0 && (
                                <line x1={padding.left} y1={getY(0)} x2={width - padding.right} y2={getY(0)} stroke={isDark ? "#4B5563" : "#9CA3AF"} strokeWidth="2" opacity="0.5" />
                            )}
                            
                            {/* Chart Data */}
                            {chartData.map((d, i) => {
                                if (!activeOwnerIds.includes(d.ownerId)) return null;
                                const color = OWNER_COLORS[i % OWNER_COLORS.length];
                                const pointsString = d.points.map(p => `${getX(p.date)},${getY(p.balance)}`).join(' ');
                                const firstX = getX(d.points[0].date);
                                const lastX = getX(d.points[d.points.length - 1].date);
                                const baseLine = height - padding.bottom;
                                const areaPoints = `${firstX},${baseLine} ${pointsString} ${lastX},${baseLine}`;
                                
                                return (
                                    <g key={d.ownerId} className="animate-in fade-in duration-500">
                                        <polygon points={areaPoints} fill={`url(#grad-${d.ownerId})`} />
                                        <polyline points={pointsString} fill="none" stroke={color} strokeWidth="4" strokeLinejoin="round" strokeLinecap="round" filter={isDark ? "url(#glow)" : ""} />
                                        
                                        {/* Data Points */}
                                        {d.points.map((p, idx) => (
                                            (idx % Math.ceil(totalDays/10) === 0 || idx === d.points.length - 1) &&
                                            <circle key={idx} cx={getX(p.date)} cy={getY(p.balance)} r="5" fill={isDark ? "#16181D" : "#FFFFFF"} stroke={color} strokeWidth="3" 
                                                className="transition-all duration-300 hover:r-7 cursor-pointer hover:stroke-[4px]"
                                                onMouseEnter={() => setHoverData({ x: getX(p.date), y: getY(p.balance), value: p.balance, color })}
                                                onMouseLeave={() => setHoverData(null)}
                                            />
                                        ))}
                                    </g>
                                );
                            })}
                            
                            {/* X-Axis Labels */}
                            {dateTicks.map((t, i) => (
                                <text key={i} x={getX(t)} y={height - 5} textAnchor="middle" className={`text-[10px] font-bold uppercase tracking-wider ${isDark ? 'fill-dark-muted' : 'fill-light-muted'}`}>
                                    {new Date(t).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}
                                </text>
                            ))}
                            
                            {/* Tooltip */}
                            {hoverData && (() => {
                                const isTop = hoverData.y < 40;
                                const isLeft = hoverData.x < 50;
                                const isRight = hoverData.x > width - 50;
                                const ty = isTop ? hoverData.y + 25 : hoverData.y - 25;
                                const tx = isLeft ? hoverData.x + 20 : (isRight ? hoverData.x - 20 : hoverData.x);
                                return (
                                    <g transform={`translate(${tx}, ${ty})`} className="pointer-events-none transition-all duration-100 ease-out z-50">
                                        <rect x="-45" y={isTop ? "-4" : "-28"} width="90" height="24" rx="6" fill={isDark ? "#272A30" : "#FFFFFF"} stroke={hoverData.color} strokeWidth="2" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))" />
                                        <text x="0" y={isTop ? "13" : "-11"} textAnchor="middle" className={`text-xs font-bold ${isDark ? 'fill-white' : 'fill-gray-900'}`}>
                                            {formatCurrency(hoverData.value)}
                                        </text>
                                        <polygon points={isTop ? "-6,-4 6,-4 0,-10" : "-6,-4 6,-4 0,2"} fill={isDark ? "#272A30" : "#FFFFFF"} stroke={hoverData.color} strokeWidth="2" />
                                        <polygon points={isTop ? "-5,-4 5,-4 0,-9" : "-5,-4 5,-4 0,1"} fill={isDark ? "#272A30" : "#FFFFFF"} />
                                    </g>
                                );
                            })()}
                        </svg>
                        
                        {/* Custom Legend */}
                        <div className="flex flex-wrap gap-3 justify-center mt-6">
                            {owners.map((owner, i) => {
                                const color = OWNER_COLORS[i % OWNER_COLORS.length];
                                const isActive = activeOwnerIds.includes(owner.id);
                                return (
                                    <button
                                        key={owner.id}
                                        onClick={() => handleLegendClick(owner.id)}
                                        className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-xs transition-all duration-300 border-2
                                            ${isActive ? 'shadow-md scale-105' : 'opacity-50 grayscale hover:grayscale-0 hover:opacity-100'}
                                        `}
                                        style={{ 
                                            backgroundColor: isActive ? (isDark ? `${color}20` : `${color}10`) : 'transparent',
                                            borderColor: isActive ? color : (isDark ? '#272A30' : '#E5E7EB'),
                                            color: isActive ? (isDark ? '#FFF' : '#000') : 'inherit'
                                        }}
                                    >
                                        <div className="w-3 h-3 rounded-full shadow-inner" style={{ backgroundColor: color }}></div>
                                        {owner.name}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const UtilityConsumptionChart = ({ bills, isDark, colorTheme = 'yellow' }) => {
            const [hoverData, setHoverData] = useState(null);
            
            if (!bills || bills.length === 0) {
                return (
                    <div className={`p-10 text-center border-2 border-dashed rounded-3xl font-bold ${isDark ? 'border-[#272A30] text-dark-muted' : 'border-[#E5E7EB] text-light-muted'}`}>
                        No consumption history available. Generate bills to see trends.
                    </div>
                );
            }

            // Get last 12 sorted bills
            const sortedBills = [...bills]
                .sort((a, b) => new Date(a.month) - new Date(b.month))
                .slice(-12);

            const maxConsumption = Math.max(...sortedBills.map(b => Number(b.consumption) || 0));
            const maxUnits = Math.max(maxConsumption * 1.15, 50); // 15% headroom so tooltips don't clip
            const height = 240; 
            const width = 800;
            const padding = { top: 45, bottom: 30, left: 50, right: 20 }; 
            const chartW = width - padding.left - padding.right;
            const chartH = height - padding.top - padding.bottom;
            
            const barW = Math.min(40, (chartW / sortedBills.length) * 0.6);
            const step = chartW / Math.max(sortedBills.length, 1);

            return (
                <div className="w-full overflow-x-auto pb-4 pt-4">
                    <div className="min-w-[600px] relative">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                            <defs>
                                <linearGradient id={`barGrad-${colorTheme}`} x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stopColor={colorTheme === 'blue' ? '#3B82F6' : '#EAB308'} stopOpacity="0.8" />
                                    <stop offset="100%" stopColor={colorTheme === 'blue' ? '#3B82F6' : '#EAB308'} stopOpacity="0.2" />
                                </linearGradient>
                            </defs>
                            
                            {/* Grid Lines */}
                            {[0, 0.5, 1].map(t => {
                                const val = t * maxUnits;
                                const y = height - padding.bottom - t * chartH;
                                return (
                                    <g key={t}>
                                        <line x1={padding.left} y1={y} x2={width - padding.right} y2={y} stroke={isDark ? "#272A30" : "#E5E7EB"} strokeWidth="1" strokeDasharray="4 4" />
                                        <text x={padding.left - 10} y={y + 4} textAnchor="end" className={`text-[10px] font-bold ${isDark ? 'fill-dark-muted' : 'fill-light-muted'}`}>
                                            {colorTheme === 'blue' ? '₹' : ''}{val.toFixed(0)}{colorTheme === 'yellow' ? 'u' : ''}
                                        </text>
                                    </g>
                                );
                            })}
                            
                            {/* Bars */}
                            {sortedBills.map((b, i) => {
                                const x = padding.left + (i * step) + (step / 2) - (barW / 2);
                                const h = (Number(b.consumption) / maxUnits) * chartH;
                                const y = height - padding.bottom - h;
                                
                                return (
                                    <g key={b.id} className="group" 
                                        onMouseEnter={() => setHoverData({ x: x + barW/2, y: y - 10, month: b.month, units: b.consumption })}
                                        onMouseLeave={() => setHoverData(null)}>
                                        <rect x={x} y={y} width={barW} height={h} rx="4" fill={`url(#barGrad-${colorTheme})`} className="transition-all duration-300 group-hover:opacity-80 cursor-pointer" />
                                        <text x={x + barW/2} y={height - 10} textAnchor="middle" className={`text-[10px] font-bold uppercase tracking-widest ${isDark ? 'fill-dark-muted' : 'fill-light-muted'}`}>
                                            {b.month.split(' ')[0].substring(0,3)}
                                        </text>
                                    </g>
                                );
                            })}

                            {/* Tooltip */}
                            {hoverData && (
                                <g transform={`translate(${hoverData.x}, ${hoverData.y})`} className="pointer-events-none transition-all duration-100 ease-out z-50">
                                    <rect x="-45" y="-35" width="90" height="30" rx="8" fill={isDark ? "#272A30" : "#FFFFFF"} stroke={colorTheme === 'blue' ? '#3B82F6' : '#EAB308'} strokeWidth="2" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))" />
                                    <text x="0" y="-20" textAnchor="middle" className={`text-[10px] font-bold ${isDark ? 'fill-gray-400' : 'fill-gray-500'}`}>{hoverData.month}</text>
                                    <text x="0" y="-8" textAnchor="middle" className={`text-xs font-black ${colorTheme === 'blue' ? 'fill-blue-500' : 'fill-yellow-500'}`}>{colorTheme === 'blue' ? '₹' : ''}{hoverData.units} {colorTheme === 'yellow' ? 'Units' : ''}</text>
                                    <polygon points="-6,-5 6,-5 0,1" fill={isDark ? "#272A30" : "#FFFFFF"} stroke={colorTheme === 'blue' ? '#3B82F6' : '#EAB308'} strokeWidth="2" />
                                    <polygon points="-5,-5 5,-5 0,0" fill={isDark ? "#272A30" : "#FFFFFF"} />
                                </g>
                            )}
                        </svg>
                    </div>
                </div>
            );
        };

        const DashboardUtilityChart = ({ bills, properties, floors, isDark }) => {
            const currentYear = new Date().getFullYear();
            const availableYears = Array.from({ length: 5 }, (_, i) => currentYear - 2 + i);

            const [selectedProp, setSelectedProp] = useState(properties[0]?.id || '');
            const [selectedYear, setSelectedYear] = useState(currentYear);
            const [utilityType, setUtilityType] = useState('electricity');
            const [metric, setMetric] = useState('costs');
            const [hoverData, setHoverData] = useState(null);
            const [hiddenFloors, setHiddenFloors] = useState([]);

            useEffect(() => {
                if (!selectedProp && properties.length > 0) setSelectedProp(properties[0].id);
                setHiddenFloors([]); // Reset hidden floors filter when property changes
            }, [properties, selectedProp]);

            const allActiveFloors = floors.filter(f => f.propertyId === selectedProp).sort((a,b) => a.name.localeCompare(b.name));
            const visibleFloors = allActiveFloors.filter(f => !hiddenFloors.includes(f.id));
            
            const monthsShort = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const fullMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            const relevantBills = bills.filter(b => b.propertyId === selectedProp && b.type === utilityType);

            const chartData = monthsShort.map((m, index) => {
                const monthData = { month: m, floors: {} };
                const expectedMonthStr = `${fullMonths[index]} ${selectedYear}`;

                visibleFloors.forEach(f => {
                    const bill = relevantBills.find(b => b.floorId === f.id && b.month === expectedMonthStr);
                    monthData.floors[f.id] = bill ? (metric === 'costs' ? Number(bill.finalBill) : Number(bill.consumption)) : 0;
                });
                return monthData;
            });

            let maxVal = 10;
            chartData.forEach(d => {
                Object.values(d.floors).forEach(v => {
                    if (v > maxVal) maxVal = v;
                });
            });
            maxVal = maxVal * 1.15; // 15% Headroom

            const height = 300;
            const width = 800;
            const padding = { top: 20, bottom: 40, left: 60, right: 20 };
            const chartW = width - padding.left - padding.right;
            const chartH = height - padding.top - padding.bottom;

            const groupW = chartW / 12;
            const barPadding = 2;
            const numFloors = Math.max(visibleFloors.length, 1);
            const maxBarW = 24;
            const calculatedBarW = (groupW - (barPadding * (numFloors + 1))) / numFloors;
            const barW = Math.min(calculatedBarW, maxBarW);
            const actualGroupW = (barW * numFloors) + (barPadding * (numFloors - 1));

            // Professional color palettes tied to utility type
            const ELECTRICITY_COLORS = ['#F59E0B', '#F97316', '#EAB308', '#EA580C', '#D97706', '#CA8A04', '#C2410C', '#A16207'];
            const WATER_COLORS = ['#0EA5E9', '#3B82F6', '#06B6D4', '#2563EB', '#0284C7', '#0891B2', '#1D4ED8', '#0369A1'];
            const FLOOR_COLORS = utilityType === 'electricity' ? ELECTRICITY_COLORS : WATER_COLORS;

            const getColorForFloor = (floorId) => {
                const idx = allActiveFloors.findIndex(f => f.id === floorId);
                return FLOOR_COLORS[idx % FLOOR_COLORS.length];
            };

            const toggleFloor = (floorId) => {
                if (hiddenFloors.includes(floorId)) {
                    setHiddenFloors(hiddenFloors.filter(id => id !== floorId));
                } else {
                    setHiddenFloors([...hiddenFloors, floorId]);
                }
            };

            const formatAxis = (val) => {
                if (val === 0) return metric === 'costs' ? '₹0' : '0';
                if (metric === 'costs') return val >= 1000 ? `₹${(val/1000).toFixed(1)}k` : `₹${Math.round(val)}`;
                return val >= 1000 ? `${(val/1000).toFixed(1)}k` : Math.round(val);
            };

            return (
                <div className="w-full">
                    {/* Header & Filters */}
                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6">
                        <div className="flex items-center gap-4">
                            <div className={`p-3 rounded-2xl ${utilityType === 'electricity' ? 'bg-yellow-500/10 text-yellow-500' : 'bg-blue-500/10 text-blue-500'}`}>
                                {utilityType === 'electricity' ? <Zap size={24} strokeWidth={2.5}/> : <Droplets size={24} strokeWidth={2.5}/>}
                            </div>
                            <div>
                                <h3 className="font-black text-xl">Utility Analytics</h3>
                                <p className="opacity-50 text-xs font-bold uppercase tracking-widest mt-1">Consumption & Cost Tracking</p>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-3">
                            {/* Property & Year Selectors */}
                            <div className={`flex items-center rounded-xl border p-1 ${isDark ? 'border-[#272A30] bg-[#16181D]' : 'border-gray-200 bg-gray-50'}`}>
                                <select value={selectedProp} onChange={(e) => setSelectedProp(e.target.value)}
                                    className={`text-xs font-bold bg-transparent outline-none px-3 py-1.5 cursor-pointer ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                    {properties.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                    {properties.length === 0 && <option value="">No Properties</option>}
                                </select>
                                <div className={`w-px h-4 mx-1 ${isDark ? 'bg-[#272A30]' : 'bg-gray-300'}`}></div>
                                <select value={selectedYear} onChange={(e) => setSelectedYear(Number(e.target.value))}
                                    className={`text-xs font-bold bg-transparent outline-none px-3 py-1.5 cursor-pointer ${isDark ? 'text-gray-300' : 'text-gray-700'}`}>
                                    {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                                </select>
                            </div>

                            {/* Metric Toggle */}
                            <div className={`flex items-center rounded-xl border p-1 ${isDark ? 'border-[#272A30] bg-[#16181D]' : 'border-gray-200 bg-gray-50'}`}>
                                <button onClick={() => setMetric('units')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${metric === 'units' ? (isDark ? 'bg-[#272A30] text-white' : 'bg-white shadow-sm text-gray-900') : 'text-gray-500 hover:text-gray-400'}`}>Units</button>
                                <button onClick={() => setMetric('costs')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${metric === 'costs' ? (isDark ? 'bg-[#272A30] text-white' : 'bg-white shadow-sm text-gray-900') : 'text-gray-500 hover:text-gray-400'}`}>Costs</button>
                            </div>

                            {/* Utility Type Toggle */}
                            <div className={`flex items-center rounded-xl border p-1 ${isDark ? 'border-[#272A30] bg-[#16181D]' : 'border-gray-200 bg-gray-50'}`}>
                                <button onClick={() => setUtilityType('electricity')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${utilityType === 'electricity' ? 'bg-yellow-500/20 text-yellow-600 dark:text-yellow-400' : 'text-gray-500'}`}><Zap size={14}/> Elec</button>
                                <button onClick={() => setUtilityType('water')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${utilityType === 'water' ? 'bg-blue-500/20 text-blue-600 dark:text-blue-400' : 'text-gray-500'}`}><Droplets size={14}/> Water</button>
                            </div>
                        </div>
                    </div>

                    {/* Chart Area */}
                    {allActiveFloors.length === 0 ? (
                        <div className={`p-10 text-center border-2 border-dashed rounded-3xl font-bold ${isDark ? 'border-[#272A30] text-dark-muted' : 'border-[#E5E7EB] text-light-muted'}`}>
                            No floors defined for the selected property.
                        </div>
                    ) : (
                        <div className="w-full overflow-x-auto pb-2">
                            <div className="min-w-[700px] relative">
                                <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                                    {/* Grid Lines */}
                                    {[0, 0.25, 0.5, 0.75, 1].map(t => {
                                        const val = t * maxVal;
                                        const y = height - padding.bottom - (t * chartH);
                                        return (
                                            <g key={t}>
                                                <line x1={padding.left} y1={y} x2={width - padding.right} y2={y} stroke={isDark ? "#272A30" : "#E5E7EB"} strokeWidth="1" strokeDasharray="4 4" />
                                                <text x={padding.left - 10} y={y + 4} textAnchor="end" className={`text-[10px] font-bold ${isDark ? 'fill-dark-muted' : 'fill-light-muted'}`}>
                                                    {formatAxis(val)}
                                                </text>
                                            </g>
                                        );
                                    })}

                                    {/* Bars */}
                                    {chartData.map((d, mIdx) => {
                                        const groupX = padding.left + (mIdx * groupW) + (groupW / 2) - (actualGroupW / 2);
                                        return (
                                            <g key={d.month}>
                                                <text x={padding.left + (mIdx * groupW) + (groupW / 2)} y={height - 15} textAnchor="middle" className={`text-[10px] font-bold uppercase tracking-wider ${isDark ? 'fill-dark-muted' : 'fill-light-muted'}`}>
                                                    {d.month}
                                                </text>
                                                {visibleFloors.map((f, fIdx) => {
                                                    const val = d.floors[f.id] || 0;
                                                    const h = (val / maxVal) * chartH;
                                                    const x = groupX + (fIdx * (barW + barPadding));
                                                    const y = height - padding.bottom - h;
                                                    const color = getColorForFloor(f.id);

                                                    if (val === 0) return null;
                                                    
                                                    // Dynamic threshold to flip the tooltip down if the bar is too close to the top edge
                                                    const isNearTop = y < 50;

                                                    return (
                                                        <rect key={f.id} x={x} y={y} width={barW} height={h} rx="2" fill={color} fillOpacity="0.85"

            unsubscribers.push(syncCollection('transactions', setTransactions));

            unsubscribers.push(syncCollection('bankUsers', setBankUsers));
            unsubscribers.push(syncCollection('bankTransactions', setBankTransactions));
            unsubscribers.push(syncCollection('utilityBills', setUtilityBills));

            unsubscribers.push(onSnapshot(getColRef('activityLog'), (snap) => {
                const logs = snap.docs.map(d => d.data());
                logs.sort((a, b) => new Date(b.date) - new Date(a.date));
                setActivityLog(logs.slice(0, 20)); 
            }, (err) => console.error(err)));

            return () => unsubscribers.forEach(unsub => unsub());
          }, [firebaseUser]);

          // Auto-fill previous meter readings when property or month changes
          useEffect(() => {
              if (utilCalc.propertyId && utilCalc.month) {
                  const selectedDate = new Date(utilCalc.month);
                  const pastBills = utilityBills
                      .filter(b => b.propertyId === utilCalc.propertyId && new Date(b.month) < selectedDate && b.type === 'electricity')
                      .sort((a,b) => new Date(b.month) - new Date(a.month));
                  
                  if (pastBills.length > 0) {
                      const latestBill = pastBills[0];
                      setUtilCalc(prev => ({
                          ...prev,
                          previousMainMeter: latestBill.mainMeter || '',
                          previousSubMeter: latestBill.subMeterSecond || ''
                      }));
                  } else {
                      setUtilCalc(prev => ({
                          ...prev,
                          previousMainMeter: '',
                          previousSubMeter: ''
                      }));
                  }
              }
          }, [utilCalc.propertyId, utilCalc.month]);

          // Auto-set water base bill defaults
          useEffect(() => {
              if (utilityTab === 'water' && utilCalc.floorId) {
                  const floor = floors.find(f => f.id === utilCalc.floorId);
                  if (floor) {
                      const isGround = floor.name.includes('GROUND');
                      const isSecond = floor.name.includes('SECOND');
                      setUtilCalc(prev => ({...prev, waterBaseBill: isGround ? '100' : (isSecond ? '200' : '0')}));
                  }
              }
          }, [utilCalc.floorId, utilityTab, floors]);

          useEffect(() => {
            if (isDark) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDark]);

          // HELPERS
          const showToast = (message, type = 'success') => {
              const id = Date.now();
              setToasts(prev => [...prev, { id, message, type }]);
              setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 3000);
          };
          const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));
          const addLog = (text) => { saveToDb('activityLog', { id: Date.now().toString(), text, date: new Date().toISOString() }); };

          const calculateTotalBankBalance = () => bankTransactions.reduce((sum, t) => t.type === 'CREDIT' ? sum + Number(t.amount) : sum - Number(t.amount), 0);
          const calculateBankUserBalance = (userId) => bankTransactions.filter(t => t.bankUserId === userId).reduce((sum, t) => t.type === 'CREDIT' ? sum + Number(t.amount) : sum - Number(t.amount), 0);
          const calculateYearTotal = (tId, year) => records.filter(r => r.tenantId === tId && r.month && r.month.includes(year.toString())).reduce((s, r) => s + Number(r.rent || 0), 0);
          const calculateOwnerBalance = (ownerId) => transactions.filter(t => t.ownerId === ownerId).reduce((acc, t) => t.type === 'CREDIT' ? acc + Number(t.amount) : acc - Number(t.amount), 0);
          
          const calculateDueDetails = (t) => {
              if (!t || isOwner(t) || !t.leaseStart || Number(t.rentAmount) <= 0) return { due: 0, months: [] };
              let due = 0;
              const months = [];
              const start = new Date(t.leaseStart);
              const now = new Date();
              let iterator = new Date(start.getFullYear(), start.getMonth(), 1);
              while (iterator <= now) {
                  const monthStr = iterator.toLocaleString('en-US', { month: 'long', year: 'numeric' });
                  const isPaid = records.some(r => r.tenantId === t.id && r.month === monthStr);
                  if (!isPaid) {
                      const cutoffDate = new Date(iterator.getFullYear(), iterator.getMonth() + 1, 10, 23, 59, 59);
                      if (now > cutoffDate) {
                          due += getRentForDate(t, iterator);
                          months.push(monthStr);
                      }
                  }
                  iterator.setMonth(iterator.getMonth() + 1);
              }
              return { due, months };
          };

          const calculateDueAmount = (t) => calculateDueDetails(t).due;
          const isLate = (t) => calculateDueAmount(t) > 0;

          // Utility Calculation Helpers
          const utilActiveFloors = floors.filter(f => f.propertyId === utilCalc.propertyId);
          const selectedUtilFloorName = utilActiveFloors.find(f => f.id === utilCalc.floorId)?.name || '';
          
          const utilPrevMainMeterNum = Number(utilCalc.previousMainMeter) || 0;
          const utilMainMeterNum = Number(utilCalc.mainMeter) || 0;
          const mainConsumption = Math.max(0, utilMainMeterNum - utilPrevMainMeterNum);

          const utilPrevSubMeterNum = Number(utilCalc.previousSubMeter) || 0;
          const utilSubMeterNum = Number(utilCalc.subMeterSecond) || 0;
          const subConsumption = Math.max(0, utilSubMeterNum - utilPrevSubMeterNum);

          const utilTotalBillNum = Number(utilCalc.totalBill) || 0;

          const utilPricePerUnit = mainConsumption > 0 ? (utilTotalBillNum / mainConsumption) : 0;
          
          let utilConsumption = 0;
          let utilConsumptionNote = '';
          
          if (selectedUtilFloorName.includes('SECOND')) {
              utilConsumption = subConsumption;
              utilConsumptionNote = `Current (${utilSubMeterNum}) - Previous (${utilPrevSubMeterNum})`;
          } else if (selectedUtilFloorName.includes('GROUND')) {
              utilConsumption = Math.max(0, mainConsumption - subConsumption);
              utilConsumptionNote = `Total Units (${mainConsumption}) - Second Floor Units (${subConsumption})`;
          } else {
              utilConsumption = 0;
              utilConsumptionNote = 'Select Ground or Second Floor to calculate based on the provided logic.';
          }

          const utilBaseBill = utilConsumption * utilPricePerUnit;
          const utilSurcharge = 15; // Unconditional Fixed Surcharge
          
          // AUTOMATED PENDING CUMULATIVE CALCULATION
          let autoPendingDue = 0;
          const selectedUtilDate = new Date(utilCalc.month);

          if (utilCalc.floorId && utilCalc.propertyId) {
              // Sum of all past electricity bills generated for this specific floor before the selected month
              const pastBills = utilityBills.filter(b => b.floorId === utilCalc.floorId && b.type === 'electricity' && new Date(b.month) < selectedUtilDate);
              
              // Use the actual saved finalBill minus previousDues to get the exact billed amount for that specific month
              // This accounts for any manual overrides made by the user in the Final Total Bill field
              const totalBilled = pastBills.reduce((sum, b) => {
                  const currentMonthActualBilled = Number(b.finalBill || 0) - Number(b.previousDues || 0);
                  return sum + currentMonthActualBilled;
              }, 0);
              
              // Sum of all electricity payments made by any tenant assigned to this property & floor before the selected month
              const floorTenants = tenants.filter(t => t.propertyId === utilCalc.propertyId && t.floor === selectedUtilFloorName);
              const floorTenantIds = floorTenants.map(t => t.id);
              const totalPaid = records
                  .filter(r => floorTenantIds.includes(r.tenantId) && new Date(r.month) < selectedUtilDate)
                  .reduce((sum, r) => sum + Number(r.electricity || 0), 0);
                  
              autoPendingDue = totalBilled - totalPaid;
          }

          const utilPreviousNum = autoPendingDue;
          const utilCalculatedFinalBill = utilBaseBill + utilSurcharge + utilPreviousNum;
          const utilFinalBill = utilCalc.finalBillOverride !== '' ? Number(utilCalc.finalBillOverride) : Math.round(utilCalculatedFinalBill);

          // AUTOMATED PENDING CUMULATIVE CALCULATION FOR WATER
          let waterAutoPendingDue = 0;
          if (utilCalc.floorId && utilCalc.propertyId) {
              const pastWaterBills = utilityBills.filter(b => b.floorId === utilCalc.floorId && b.type === 'water' && new Date(b.month) < selectedUtilDate);
              const totalWaterBilled = pastWaterBills.reduce((sum, b) => sum + (Number(b.finalBill || 0) - Number(b.previousDues || 0)), 0);
              
              const floorTenants = tenants.filter(t => t.propertyId === utilCalc.propertyId && t.floor === selectedUtilFloorName);
              const floorTenantIds = floorTenants.map(t => t.id);
              const totalWaterPaid = records
                  .filter(r => floorTenantIds.includes(r.tenantId) && new Date(r.month) < selectedUtilDate)
                  .reduce((sum, r) => sum + Number(r.water || 0), 0);
                  
              waterAutoPendingDue = totalWaterBilled - totalWaterPaid;
          }
          const waterCalculatedFinalBill = Number(utilCalc.waterBaseBill || 0) + waterAutoPendingDue;
          const waterFinalBill = utilCalc.finalBillOverride !== '' ? Number(utilCalc.finalBillOverride) : Math.round(waterCalculatedFinalBill);

          const getPaidAmountForBill = (bill) => {
              const floor = floors.find(f => f.id === bill.floorId);
              if (!floor) return 0;
              const floorTenants = tenants.filter(t => t.propertyId === bill.propertyId && t.floor === floor.name);
              const tenantIds = floorTenants.map(t => t.id);
              const matchingRecords = records.filter(r => tenantIds.includes(r.tenantId) && r.month === bill.month);
              return matchingRecords.reduce((sum, r) => sum + Number(bill.type === 'water' ? (r.water || 0) : (r.electricity || 0)), 0);
          };

          };

          const saveProperty = () => {
