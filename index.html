                                                <div className="w-24 h-24 bg-gradient-to-tr from-brand-500 to-purple-500 rounded-[1.5rem] flex items-center justify-center text-4xl font-black text-white shadow-xl shadow-brand-500/40 transform -rotate-3">
                                                    {selectedTenant.name ? selectedTenant.name[0].toUpperCase() : 'U'}
                                                </div>
                                                <div className="pt-2">
                                                    <h2 className="text-3xl font-black tracking-tight mb-3">{selectedTenant.name || 'Unknown Tenant'}</h2>
                                                    <div className="flex flex-wrap justify-center md:justify-start gap-2">
                                                        <span className="text-[10px] font-black px-3 py-1.5 rounded-lg border uppercase tracking-widest bg-brand-500/10 text-brand-500 border-brand-500/30">{propName}</span>
                                                        <span className="text-[10px] font-black px-3 py-1.5 rounded-lg border uppercase tracking-widest bg-brand-500/10 text-brand-500 border-brand-500/30">{selectedTenant.floor}</span>
                                                        <span className="text-[10px] font-black px-3 py-1.5 rounded-lg border uppercase tracking-widest bg-purple-500/10 text-purple-500 border-purple-500/30">{selectedTenant.unit}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex gap-4 w-full md:w-auto relative z-10 overflow-x-auto hide-scrollbar pb-2">
                                                <div className={`flex-1 min-w-[100px] md:w-32 p-4 rounded-2xl border-2 flex flex-col justify-center items-center text-center shadow-sm 
                                                    ${isDark ? 'border-[#272A30] bg-[#0F1115]' : 'border-white bg-white/80 backdrop-blur-sm'}`}>
                                                    <p className="opacity-40 text-[9px] uppercase font-black tracking-[0.2em] mb-2">Deposit</p>
                                                    <p className="font-black text-xl">{formatCurrency(selectedTenant.advanceAmount)}</p>
                                                </div>
                                                <div className={`flex-1 min-w-[120px] md:w-36 p-4 rounded-2xl border-2 flex flex-col justify-center items-center text-center shadow-lg shadow-emerald-500/10
                                                    ${isDark ? 'border-emerald-500/30 bg-emerald-500/10' : 'border-emerald-300 bg-emerald-50'}`}>
                                                    <p className="text-emerald-600 dark:text-emerald-400 text-[9px] uppercase font-black tracking-[0.2em] mb-2">Yield {selectedYear}</p>
                                                    <p className="text-emerald-600 dark:text-emerald-400 font-black text-2xl"><AnimatedNumber value={calculateYearTotal(selectedTenant.id, selectedYear)} formatter={formatCurrency} /></p>
                                                </div>
                                                <div className={`flex-1 min-w-[140px] md:w-48 p-4 rounded-2xl border-2 flex flex-col justify-center items-center text-center shadow-lg shadow-red-500/10
                                                    ${isDark ? 'border-red-500/30 bg-red-500/10' : 'border-red-300 bg-red-50'}`}>
                                                    <p className="text-red-600 dark:text-red-400 text-[9px] uppercase font-black tracking-[0.2em] mb-2">Pending Dues</p>
                                                    <p className="text-red-600 dark:text-red-400 font-black text-2xl"><AnimatedNumber value={pendingDue} formatter={formatCurrency} /></p>
                                                    {pendingMonths.length > 0 && (
                                                        <div className="flex flex-wrap justify-center gap-1 mt-2">
                                                            {pendingMonths.map(m => <span key={m} className="text-[8px] bg-red-500/20 text-red-500 px-1.5 py-0.5 rounded uppercase font-bold tracking-wider">{m.split(' ')[0]} '{m.split(' ')[1].slice(-2)}</span>)}
                                                        </div>
                                                    )}
                                                    {pendingMonths.length === 0 && <span className="text-[8px] opacity-60 mt-2 uppercase tracking-widest font-bold">All Cleared</span>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className={`rounded-[2rem] border-2 shadow-xl overflow-hidden flex flex-col ${isDark ? 'border-[#272A30] bg-dark-card' : 'border-light-border bg-white'}`}>
                                            <div className="overflow-x-auto max-h-[55vh] hide-scrollbar relative">
                                                <table className="w-full text-left relative min-w-full md:min-w-[700px] block md:table p-4 md:p-0">
                                                    <thead className={`text-[10px] font-black tracking-[0.2em] uppercase sticky top-0 z-20 backdrop-blur-xl hidden md:table-header-group
                                                        ${isDark ? 'bg-[#1A1D24]/95 text-dark-muted border-b-2 border-[#272A30]' : 'bg-[#F9FAFB]/95 text-light-muted border-b-2 border-[#E5E7EB]'}`}>
                                                        <tr><th className="p-5">Cycle</th><th className="p-5">Rent (₹)</th><th className="p-5">Power (₹)</th><th className="p-5">Water (₹)</th><th className="p-5">Meter</th><th className="p-5">Channel</th><th className="p-5">Cleared</th><th className="p-5 text-right"></th></tr>
                                                    </thead>
                                                    <tbody className="divide-y-0 md:divide-y-2 divide-gray-100 dark:divide-[#272A30] block md:table-row-group">
                                                        {getMonthsList(selectedYear).map(month => (
                                                            <MonthlyRecordRow key={month} month={month} record={records.find(r => r.tenantId === selectedTenant.id && r.month === month)} 
                                                                onSave={(e) => handleProtectedAction(e, saveRecord)} 
                                                                onEdit={(month, record) => handleProtectedAction(null, () => handleEditRow(month, record))} 
                                                                onDelete={(id) => handleProtectedAction(null, () => requestDeleteRecord(id))} 
                                                                isDark={isDark} isEditing={editingMonth === month} editState={editRecordState} setEditState={setEditRecordState} 
                                                            />
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}

                                {modalMode === 'add_tenant' && (
                                    <div className="space-y-6">
                                        <CustomSelect 
                                            isDark={isDark} label="Select Estate Location" value={formTenant.propertyId || (properties.length > 0 ? properties[0].id : '')} icon={Map}
                                            options={properties.map(p => ({value: p.id, label: p.name}))}
                                            onChange={val => { setFormTenant({...formTenant, propertyId: val, floor: '', unit: ''}); }}
                                        />
                                        <div className="border-t-2 border-dashed py-4 my-2 opacity-50 dark:border-[#272A30]"></div>
                                        <FloatingInput label="Primary Leaseholder Name" value={formTenant.name} icon={Users} onChange={e=>setFormTenant({...formTenant, name: e.target.value})} isDark={isDark} />
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                            <FloatingInput label="Contact Terminal" value={formTenant.mobile} icon={Phone} onChange={e=>setFormTenant({...formTenant, mobile: e.target.value})} isDark={isDark} />
                                            <FloatingInput label="Base Yield ₹" type="number" value={formTenant.rentAmount} icon={DollarSign} onChange={e=>setFormTenant({...formTenant, rentAmount: e.target.value})} isDark={isDark} />
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                            <FloatingInput label="Security Deposit ₹" type="number" value={formTenant.advanceAmount} icon={Shield} onChange={e=>setFormTenant({...formTenant, advanceAmount: e.target.value})} isDark={isDark} />
                                            <div className="hidden sm:block"></div> 
                                        </div>
                                        
                                        <div className="border-t-2 border-dashed py-4 my-2 opacity-50 dark:border-[#272A30]"></div>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                            <CustomSelect 
                                                isDark={isDark} label="Allocate Level" value={formTenant.floor} 
                                                options={[...activeFloorsForTenant.map(f=>({value: f.name, label: f.name})), {value: 'EXPIRED', label: 'EXPIRED (Archive)', className: 'text-red-500'}]}
                                                onChange={val => {
                                                    if (val === 'EXPIRED') setFormTenant({...formTenant, floor: 'EXPIRED', unit: 'N/A'});
                                                    else { const sf = activeFloorsForTenant.find(f => f.name === val); setFormTenant({...formTenant, floor: val, unit: sf ? sf.units[0] : ''}); }
                                                }}
                                            />
                                            <CustomSelect 
                                                isDark={isDark} label="Allocate Zone" value={formTenant.unit} disabled={formTenant.floor === 'EXPIRED'}
                                                options={formTenant.floor === 'EXPIRED' ? [{value: 'N/A', label: 'N/A'}] : (activeFloorsForTenant.find(f=>f.name===formTenant.floor)?.units.map(u=>({value:u, label:u})) || [])}
                                                onChange={val => setFormTenant({...formTenant, unit: val})}
                                            />
                                        </div>
                                        <FloatingInput multiline label="Registered Origin Address" value={formTenant.address} icon={MapPin} onChange={e=>setFormTenant({...formTenant, address: e.target.value})} isDark={isDark} />
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                            <FloatingInput label="Lease Inception" type="date" value={formTenant.leaseStart} icon={Calendar} onChange={e=>setFormTenant({...formTenant, leaseStart: e.target.value})} isDark={isDark} />
                                            <FloatingInput label="Lease Expiration" type="date" value={formTenant.leaseEnd} icon={Calendar} onChange={e=>setFormTenant({...formTenant, leaseEnd: e.target.value})} isDark={isDark} />
                                        </div>

                                        <div className={`p-6 rounded-3xl border-2 mt-8 ${isDark ? 'border-[#272A30] bg-[#16181D]' : 'border-light-border bg-gray-50'}`}>
                                            <div className="flex items-center gap-3 mb-5">
                                                <TrendingUp size={18} className="text-brand-500"/>
                                                <p className="text-xs font-black uppercase tracking-[0.2em]">Yield Trajectory (Revisions)</p>
                                            </div>
                                            {(formTenant.rentRevisions || []).map((rev, idx) => (
                                                <div key={idx} className={`flex flex-col sm:flex-row gap-4 mb-4 p-4 rounded-2xl border-2 relative group
                                                    ${isDark ? 'border-[#272A30] bg-[#0F1115]' : 'border-light-border bg-white'}`}>
                                                    <FloatingInput label="Active From" type="month" value={rev.effectiveDate} onChange={(e) => {
                                                        const newRevs = [...(formTenant.rentRevisions || [])];
                                                        newRevs[idx].effectiveDate = e.target.value;
                                                        setFormTenant({...formTenant, rentRevisions: newRevs});
                                                    }} isDark={isDark} />
                                                    <FloatingInput label="Adjusted Yield ₹" type="number" value={rev.amount} onChange={(e) => {
                                                        const newRevs = [...(formTenant.rentRevisions || [])];
                                                        newRevs[idx].amount = e.target.value;
                                                        setFormTenant({...formTenant, rentRevisions: newRevs});
                                                    }} isDark={isDark} />
                                                    <button onClick={() => {
                                                        const newRevs = [...(formTenant.rentRevisions || [])];
                                                        newRevs.splice(idx, 1);
                                                        setFormTenant({...formTenant, rentRevisions: newRevs});
                                                    }} className="absolute -top-3 -right-3 text-white bg-red-500 p-2 rounded-xl shadow-lg opacity-0 group-hover:opacity-100 transition-all hover:scale-110 active:scale-95"><X size={14} strokeWidth={3}/></button>
                                                </div>
                                            ))}
                                            <button onClick={() => setFormTenant({...formTenant, rentRevisions: [...(formTenant.rentRevisions||[]), { effectiveDate: '', amount: '' }]})} 
                                                className={`w-full text-sm font-bold py-4 rounded-2xl transition-all border-2 border-dashed flex items-center justify-center gap-2
                                                ${isDark ? 'border-brand-500/50 text-brand-400 hover:bg-brand-500/10' : 'border-brand-300 text-brand-600 hover:bg-brand-50'}`}>
                                                <Plus size={18} strokeWidth={2.5}/> Schedule Revision
                                            </button>
                                        </div>

                                        <button onClick={(e) => handleProtectedAction(e, saveTenant)} className="w-full bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 text-white py-5 rounded-2xl font-black text-lg mt-8 shadow-xl shadow-brand-500/30 active:scale-[0.98] transition-all hover:-translate-y-1">
                                            {editingTenantId ? 'Update Tenant Profile' : 'Register New Tenant'}
                                        </button>
                                    </div>
                                )}

                                {modalMode === 'add_owner' && (
                                    <div className="space-y-6">
                                        <FloatingInput label="Stakeholder Legal Name" value={formOwner.name} icon={Briefcase} onChange={e=>setFormOwner({...formOwner, name: e.target.value})} isDark={isDark} />
                                        
                                        <div className="mt-8">
                                            <div className="flex items-center gap-3 mb-5 px-2">
                                                <Map size={18} className="text-brand-500"/>
                                                <p className="text-xs font-black uppercase tracking-[0.2em]">Portfolio Asset Assignment</p>
                                            </div>
                                            
                                            {/* GROUPED PROPERTY/FLOOR SELECTOR */}
                                            <div className="max-h-[45vh] overflow-y-auto space-y-5 hide-scrollbar px-1 pb-4">
                                                {properties.length === 0 ? (
                                                    <div className={`text-sm font-bold opacity-50 p-10 text-center border-2 border-dashed rounded-3xl ${isDark ? 'border-[#272A30]' : 'border-light-border'}`}>
                                                        No estates available. Build property first.
                                                    </div>
                                                ) : properties.map(prop => {
                                                    const propFloors = floors.filter(f => f.propertyId === prop.id);
                                                    if (propFloors.length === 0) return null;
                                                    
                                                    return (
                                                        <div key={prop.id} className={`p-5 rounded-[2rem] border-2 transition-colors ${isDark ? 'bg-[#16181D] border-[#272A30]' : 'bg-white border-[#E5E7EB] shadow-sm'}`}>
                                                            <h4 className="text-sm font-black uppercase tracking-widest mb-4 text-brand-500 flex items-center gap-2">
                                                                <Building size={16}/> {prop.name}
                                                            </h4>
                                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                                {propFloors.map(floor => {
                                                                    const isSelected = formOwner.floorIds.includes(floor.id);
                                                                    return (
                                                                        <div key={floor.id} 
                                                                            className={`flex items-center gap-4 p-4 rounded-xl border-2 cursor-pointer transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]
                                                                                ${isSelected 
                                                                                    ? (isDark ? 'bg-brand-500/20 border-brand-500 shadow-glow' : 'bg-brand-50 border-brand-500 shadow-md') 
                                                                                    : (isDark ? 'bg-[#0F1115] border-[#272A30] hover:border-gray-600' : 'bg-gray-50 border-transparent hover:border-gray-300')}`} 
                                                                            onClick={() => { const ids = isSelected ? formOwner.floorIds.filter(id => id !== floor.id) : [...formOwner.floorIds, floor.id]; setFormOwner({...formOwner, floorIds: ids}); }}
                                                                        >
                                                                            <div className={`w-6 h-6 rounded-full flex items-center justify-center transition-colors shrink-0 border-2 
                                                                                ${isSelected ? 'bg-brand-500 border-brand-500 text-white' : 'bg-transparent border-gray-400 dark:border-gray-600 text-transparent'}`}>
                                                                                <Check size={14} strokeWidth={3} />
                                                                            </div>
                                                                            <span className={`text-sm font-bold truncate ${isSelected ? 'text-brand-600 dark:text-brand-400' : 'opacity-70'}`}>{floor.name}</span>
                                                                        </div>
                                                                    )
                                                                })}
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                        <button onClick={(e) => handleProtectedAction(e, saveOwner)} className="w-full bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 text-white py-5 rounded-2xl font-black text-lg mt-4 shadow-xl shadow-brand-500/30 active:scale-[0.98] transition-all hover:-translate-y-1">
                                            {editingOwnerId ? 'Update Stakeholder' : 'Register Stakeholder'}
                                        </button>
                                    </div>
                                )}

                                {modalMode === 'add_transaction' && (
                                    <div className="space-y-6">
                                        <FloatingInput label="Ledger Description (e.g. Roof Repair)" value={formTransaction.purpose} icon={Activity} onChange={e=>setFormTransaction({...formTransaction, purpose: e.target.value})} isDark={isDark} />
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 z-50">
                                            <CustomSelect isDark={isDark} label="Flow Direction" value={formTransaction.type} options={[{value:'DEBIT', label:'Expense / Debit (-)'}, {value:'CREDIT', label:'Income / Credit (+)'}]} onChange={val=>setFormTransaction({...formTransaction, type: val})} />
                                            <FloatingInput label="Value ₹" type="number" value={formTransaction.amount} icon={DollarSign} onChange={e=>setFormTransaction({...formTransaction, amount: e.target.value})} isDark={isDark} />
                                        </div>
                                        <FloatingInput label="Execution Date" type="date" value={formTransaction.date} icon={Calendar} onChange={e=>setFormTransaction({...formTransaction, date: e.target.value})} isDark={isDark} />
                                        
                                        <button onClick={(e) => handleProtectedAction(e, saveTransaction)} className={`w-full py-5 rounded-2xl font-black text-lg mt-6 text-white shadow-xl active:scale-[0.98] transition-all hover:-translate-y-1 
                                            ${formTransaction.type === 'DEBIT' ? 'bg-gradient-to-r from-red-600 to-rose-600 shadow-red-500/30 hover:from-red-500 hover:to-rose-500' : 'bg-gradient-to-r from-emerald-600 to-teal-500 shadow-emerald-500/30 hover:from-emerald-500 hover:to-teal-400'}`}>
                                            {editingTransactionId ? 'Update Ledger Entry' : 'Post to Ledger'}
                                        </button>
                                    </div>
                                )}

                                {modalMode === 'add_user' && (
                                    <div className="space-y-6">
                                        <FloatingInput label="Clearance Name" value={formUser.name} icon={Users} onChange={e=>setFormUser({...formUser, name: e.target.value})} isDark={isDark} />
                                        <FloatingInput label="Access ID" value={formUser.username} icon={Shield} onChange={e=>setFormUser({...formUser, username: e.target.value})} isDark={isDark} />
                                        <FloatingInput label="Security Key" type="password" value={formUser.password} icon={Key} onChange={e=>setFormUser({...formUser, password: e.target.value})} isDark={isDark} />
                                        <CustomSelect isDark={isDark} label="Access Level" value={formUser.role} options={[{value:'admin', label:'Root Administrator'}, {value:'viewer', label:'Standard Access'}]} onChange={val=>setFormUser({...formUser, role: val})} />
                                        
                                        <button onClick={saveUser} className="w-full bg-gradient-to-r from-brand-600 to-purple-600 text-white py-5 rounded-2xl font-black text-lg mt-6 shadow-xl shadow-brand-500/30 active:scale-[0.98] transition-all hover:-translate-y-1">
                                            Grant Access
                                        </button>
                                    </div>
                                 )}

                                {modalMode === 'add_bank_user' && (
                                    <div className="space-y-6">
                                        <div className={`p-4 rounded-2xl border-l-4 border-blue-500 mb-6 ${isDark ? 'bg-blue-500/10' : 'bg-blue-50'}`}>
                                            <p className={`text-sm font-semibold leading-relaxed ${isDark ? 'text-blue-200' : 'text-blue-900'}`}>Register a corporate entity or stakeholder authorized for Vault transactions.</p>
                                        </div>
                                        <FloatingInput label="Entity Legal Name" value={formBankUser.name} icon={Briefcase} onChange={e=>setFormBankUser({...formBankUser, name: e.target.value})} isDark={isDark} />
                                        <button onClick={(e) => handleProtectedAction(e, saveBankUser)} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-5 rounded-2xl font-black text-lg mt-6 shadow-xl shadow-blue-500/30 active:scale-[0.98] transition-all hover:-translate-y-1">
                                            {editingBankUserId ? 'Update Member' : 'Register Member'}
                                        </button>
                                    </div>
                                )}

                                {modalMode === 'add_bank_transaction' && (
                                    <div className="space-y-6">
                                        <CustomSelect 
                                            isDark={isDark} 
                                            label="Select Authorized Member" 
                                            value={formBankTxn.bankUserId} 
                                            icon={Users}
                                            options={bankUsers.map(u => ({ value: u.id, label: u.name }))} 
                                            onChange={val => setFormBankTxn({...formBankTxn, bankUserId: val})} 
                                        />
                                        <FloatingInput label="Transaction Manifest" value={formBankTxn.purpose} icon={Activity} onChange={e=>setFormBankTxn({...formBankTxn, purpose: e.target.value})} isDark={isDark} />
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 z-50">
                                            <CustomSelect 
                                                isDark={isDark} 
                                                label="Capital Flow" 
                                                value={formBankTxn.type} 
                                                options={[{value:'CREDIT', label:'Injection / Credit (+)'}, {value:'DEBIT', label:'Extraction / Debit (-)'}]} 
                                                onChange={val=>setFormBankTxn({...formBankTxn, type: val})} 
                                            />
                                            <FloatingInput label="Capital Value ₹" type="number" value={formBankTxn.amount} icon={DollarSign} onChange={e=>setFormBankTxn({...formBankTxn, amount: e.target.value})} isDark={isDark} />
                                        </div>
                                        <FloatingInput label="Execution Date" type="date" value={formBankTxn.date} icon={Calendar} onChange={e=>setFormBankTxn({...formBankTxn, date: e.target.value})} isDark={isDark} />
                                        
                                        <button onClick={(e) => handleProtectedAction(e, saveBankTransaction)} className={`w-full py-5 rounded-2xl font-black text-lg mt-6 text-white shadow-xl active:scale-[0.98] transition-all hover:-translate-y-1 
                                            ${formBankTxn.type === 'DEBIT' ? 'bg-gradient-to-r from-red-600 to-rose-600 shadow-red-500/30 hover:from-red-500 hover:to-rose-500' : 'bg-gradient-to-r from-emerald-600 to-teal-500 shadow-emerald-500/30 hover:from-emerald-500 hover:to-teal-400'}`}>
                                            {editingBankTxnId ? 'Update Vault Transfer' : 'Authorize Vault Transfer'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                )}
              </div>
            </div>
          );
        }

        // Render Application
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
